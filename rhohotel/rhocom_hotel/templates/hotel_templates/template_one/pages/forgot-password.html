<!DOCTYPE html>
<html lang="en">
<head>
	{% include "rhocom_hotel/templates/hotel_templates/template_one/includes/head.html" %}
</head>
<body class="hms-auth-body" style="
  --web-primary: {{ hotel.primary_color or '#0C3989' }};
  --web-secondary: {{ hotel.secondary_color or '#124B6B' }};
  --web-accent: {{ hotel.accent_color or '#9B362D' }};
">

<!-- Floating Back to Website Action Badge -->
<a href="/" class="hms-auth-back-nav">
	<i class="bi bi-arrow-left-short fs-4"></i>
	<span>Back to Website</span>
</a>

<!-- Ambient Abstract Background Graphic Rings -->
<div class="hms-auth-blur-circle circle-1"></div>
<div class="hms-auth-blur-circle circle-2"></div>

<div
	class="container d-flex align-items-center justify-content-center min-vh-100 position-relative z-10">
	<div class="hms-auth-glass-card">

		<!-- Context Navigation Return Arrow -->
		<div class="mb-4">
			<a href="/login"
			   class="hms-auth-link-alt small text-decoration-none d-inline-flex align-items-center">
				<i class="bi bi-arrow-left me-2"></i> Return to login page
			</a>
		</div>

		<!-- Branding Header -->
		<div class="text-center mb-4">
			<div class="hms-auth-icon-badge mb-3">
				<i class="bi bi-key-fill text-white fs-4"></i>
			</div>
			<h2 class="hms-auth-title text-white">Reset Password</h2>
			<p class="text-white-50 small">Provide your profile's registered email verification
				handle to securely route an encryption-reset linkage frame.</p>
		</div>

		<!-- Form Wrapper Block -->
		<form id="forgot-form">

			<!-- Target Account Identification Email -->
			<div class="mb-4">
				<label class="form-label hms-auth-label">Registered Verification Email</label>
				<div class="input-group hms-auth-input-group">
					<span class="input-group-text"><i
						class="bi bi-envelope text-white-50"></i></span>
					<input type="email" id="email" class="form-control" placeholder="name@example.com"
					       required autocomplete="email">
				</div>
			</div>

			<!-- Recovery Submission Request Dispatcher -->
			<button type="submit" id="resetBtn" class="btn hms-btn-auth w-100 py-3 fw-bold">
				Transmit Recovery Token Linkage <i class="bi bi-envelope-paper-fill ms-2"></i>
			</button>

		</form>
		<div id="resetMessage" class="mt-3"></div>
	</div>
</div>

<script>
	document.getElementById("forgot-form").addEventListener("submit", async function (e) {

		e.preventDefault();

		const email = document.getElementById("email").value;
		const btn = document.getElementById("resetBtn");

		btn.disabled = true;
		btn.innerHTML = `
        <span class="spinner-border spinner-border-sm me-2"></span>
        Sending...
    `;

		try {

			const response = await fetch(
				"/api/method/frappe.core.doctype.user.user.reset_password",
				{
					method: "POST",
					headers: {
						"Content-Type": "application/json"
					},
					credentials: "same-origin",
					body: JSON.stringify({
						user: email
					})
				}
			);

			const data = await response.json();

			if (data.exc) {
				throw new Error();
			}

			document.getElementById("resetMessage").innerHTML = `
            <div class="alert alert-success">
                If an account exists for this email, a password reset link has been sent.
            </div>
        `;

		} catch (err) {

			document.getElementById("resetMessage").innerHTML = `
            <div class="alert alert-danger">
                Unable to send reset email.
            </div>
        `;

		} finally {

			btn.disabled = false;
			btn.innerHTML = "Send Reset Link";

		}
	});
</script>
</body>
</html>
