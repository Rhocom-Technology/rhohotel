<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMS | Recover Guest Profile Framework</title>
    <!-- Bootstrap 5 CSS & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="hms-auth-body">

    <!-- Floating Back to Website Action Badge -->
    <a href="/" class="hms-auth-back-nav">
        <i class="bi bi-arrow-left-short fs-4"></i>
        <span>Back to Website</span>
    </a>

    <!-- Ambient Abstract Background Graphic Rings -->
    <div class="hms-auth-blur-circle circle-1"></div>
    <div class="hms-auth-blur-circle circle-2"></div>

    <div class="container d-flex align-items-center justify-content-center min-vh-100 position-relative z-10">
        <div class="hms-auth-glass-card">
            
            <!-- Context Navigation Return Arrow -->
            <div class="mb-4">
                <a href="login.html" class="hms-auth-link-alt small text-decoration-none d-inline-flex align-items-center">
                    <i class="bi bi-arrow-left me-2"></i> Return to login page
                </a>
            </div>

            <!-- Branding Header -->
            <div class="text-center mb-4">
                <div class="hms-auth-icon-badge mb-3">
                    <i class="bi bi-key-fill text-white fs-4"></i>
                </div>
                <h2 class="hms-auth-title text-white">Reset Password</h2>
                <p class="text-white-50 small">Provide your profile's registered email verification handle to securely route an encryption-reset linkage frame.</p>
            </div>

            <!-- Form Wrapper Block -->
            <form action="/reset-request-endpoint" method="POST">
                
                <!-- Target Account Identification Email -->
                <div class="mb-4">
                    <label class="form-label hms-auth-label">Registered Verification Email</label>
                    <div class="input-group hms-auth-input-group">
                        <span class="input-group-text"><i class="bi bi-envelope text-white-50"></i></span>
                        <input type="email" class="form-control" placeholder="name@example.com" required autocomplete="email">
                    </div>
                </div>

                <!-- Recovery Submission Request Dispatcher -->
                <button type="submit" class="btn hms-btn-auth w-100 py-3 fw-bold">
                    Transmit Recovery Token Linkage <i class="bi bi-envelope-paper-fill ms-2"></i>
                </button>

            </form>
        </div>
    </div>

</body>
</html>
