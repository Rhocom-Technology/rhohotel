<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	{% include "rhocom_hotel/templates/hotel_templates/template_one/includes/head.html" %}
</head>
<body style="
  --web-primary: {{ hotel.primary_color or '#0C3989' }};
  --web-secondary: {{ hotel.secondary_color or '#124B6B' }};
  --web-accent: {{ hotel.accent_color or '#9B362D' }};
">
{% include "rhocom_hotel/templates/hotel_templates/template_one/includes/navbar.html" %}

<section class="py-5 bg-light mt-5" id="booking-engine-core" style="min-height: 80vh;">
	<div class="container py-5">
		<div class="row justify-content-center">
			<div class="col-lg-8">

				<div id="booking-confirmation-workspace" class="card border rounded-3 p-4 p-md-5 shadow-sm bg-white position-relative overflow-hidden">
				</div>

				<div class="d-flex flex-wrap justify-content-center gap-3 mt-4 d-print-none">
					<button type="button" class="btn btn-dark px-4 py-2 text-uppercase fw-bold shadow-sm" style="font-size: 0.75rem;" onclick="printReceipt()">
						<i class="bi bi-printer-fill me-2"></i> Print / Save as PDF
					</button>
					<button type="button" class="btn btn-outline-secondary px-4 py-2 text-uppercase fw-bold shadow-sm" style="font-size: 0.75rem;" onclick="location.href='/booking';">
						<i class="bi bi-house-door me-1"></i> Return to Main Hub
					</button>
				</div>

			</div>
		</div>
	</div>
</section>
{% include "rhocom_hotel/templates/hotel_templates/template_one/includes/footer.html" %}

<script src="/assets/rhohotel/hotel_templates/template_one/js/booking-success.js"></script>

<script>
	// pass hotel data safely into JS (IMPORTANT FIX)
	window.HOTEL = {
		name: "{{ hotel.hotel_name or 'Hotel' }}",
		email: "{{ hotel.email or 'reservations@example.com' }}",
		phone: "{{ hotel.phone or '+234 800 000 0000' }}",
		address: "{{ hotel.address or '' }}",
		logo: "{{ hotel.logo or '' }}"
	};



</script>
</body>
</html>
